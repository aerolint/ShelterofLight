<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .admin-nav { background: transparent; padding: 15px; display: flex; justify-content: space-around;  align-items: center; }
        .admin-nav a { color: #000; text-decoration: none; font-weight: bold; }
        .admin-nav a:hover { color: purple; }
        .header-font { font-family: 'Alfa Slab One', cursive; text-align: center; }
        .panel { background-color: #1a1a1a; border: 1px solid #fff; border-radius: 15px; padding: 20px; color: #fff; margin: 20px; }
        .medical-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #fff; }
        th, td { padding: 15px; text-align: left; border: 1px solid #444; }
        th { background: #333; }
        label { display: block; margin: 15px 0 5px; }
        select, input, textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: #fff; box-sizing: border-box; }
        .yellow-btn { background: #ffd464; color: #000; font-weight: bold; padding: 10px 20px; border: none; cursor: pointer; width: 100%; margin-top: 15px; }
        .logout-btn { border: 1px solid #000; border-radius: 20px; transition: 0.3s; padding: 8px 20px; }
        .logout-btn:hover { background-color: #fff; color: #000 !important; }
    </style>
</head>

<script src="../script.js"></script>

<body>

<header>
    <div class="retro-header">SHELTER OF LIGHT</div>
    <nav class="admin-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="rescues.html">Rescues</a>
        <a href="medical.html" style="color: purple;">Medical Records</a>
        <a href="donations.html">Donations</a>
        <a href="applications.html">Applications</a>

        <a href="login-admin.html" class="logout-btn">LOGOUT</a>
    </nav>
</header>

<div class="header-font" style="margin-top: 40px;">
    <h3 style="font-size: 25px; margin: 0; color: #ffd464;">MEDICAL</h3>
    <h1 style="font-size: 50px; margin: 0; color: #ffd464 !important; font-family: 'Alfa Slab One', cursive;">Records</h1>
</div>

<div class="medical-grid">
    <div class="panel">
        <h3 style="margin-top: 0; text-align: center;">LOG NEW VETERINARY RECORD</h3>
        <label>Pet ID</label>
        <input type="text" id="mPetId" placeholder="Enter Pet ID">
        
        <label>Choose Rescue Resident</label>
        <select id="mResident">
            <option value="">Select a resident...</option>
            </select>
        
        <label>Select Attending Facility</label>
        <select id="mClinic"><option>Select a clinic...</option></select>
        
        <label>Treatment Date</label>
        <input type="date" id="mDate">
        
        <label>Diagnosis & Treatment Notes</label>
        <textarea id="mDiagnosis" rows="4"></textarea>
        
        <button class="yellow-btn" onclick="addMedicalRecord()">Commit Log to Central Database</button>
    </div>

    <div class="panel">
        <h3 style="margin-top: 0; text-align: center;">VETERINARY LOGS</h3>
        <input type="text" placeholder="Search by Pet Name or Clinic...">
        <table id="medicalTable">
            <thead>
                <tr>
                    <th>DATE</th>
                    <th>PET ID</th>
                    <th>RESIDENT</th>
                    <th>CLINIC</th>
                    <th>DIAGNOSIS</th>
                </tr>
            </thead>
            <tbody id="medicalBody"></tbody>
        </table>
    </div>
</div>

<script>
    function addMedicalRecord() {
        const tableBody = document.getElementById("medicalBody");
        const newRow = tableBody.insertRow();
        
        newRow.insertCell(0).textContent = document.getElementById('mDate').value;
        newRow.insertCell(1).textContent = document.getElementById('mPetId').value;
        newRow.insertCell(2).textContent = document.getElementById('mResident').value;
        newRow.insertCell(3).textContent = document.getElementById('mClinic').value;
        newRow.insertCell(4).textContent = document.getElementById('mDiagnosis').value;
        
        newRow.contentEditable = "true";
    }
</script>

</body>
</html>
