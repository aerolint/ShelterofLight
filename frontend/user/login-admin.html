<head>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<script src="../script.js"></script>

<body class="login-page">

    <h1 style="text-align: center; color: #000; margin: 0;">The Light We Carry</h1>
    <h2 style="text-align: center; color: #000; margin: 0;">WELCOME BACK</h2>

    <div class="login-container">
        <form onsubmit="handleAdminLogin(event)">
            <label>Username</label>
            <input type="text" name="Username" required>

            <label>Password</label>
            <input type="password" name="Password" required>

            <button type="submit" style="width: 100%; padding: 12px; cursor: pointer;">LOGIN</button>
        </form>
    </div>

    <script>
    async function handleAdminLogin(event) {
        event.preventDefault();
        const form = event.target;
        const result = await loginUser(form.Username.value.trim(), form.Password.value);
        if (result.success && result.role === 'Admin') {
            window.location.href = 'dashboard.html';
        } else if (result.success) {
            showNotification('This account is not an administrator.', 'warning');
        } else {
            showNotification(apiErrorText(result), 'error');
        }
    }
    </script>
 
    <div class="signup-text">
        <p>DON'T HAVE AN ACCOUNT YET? <br> 
        <a href="register-admin.html" style="color: #000; font-weight: bold;">Signup</a></p>
    </div>

</body>
