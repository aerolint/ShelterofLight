<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .admin-nav { background: transparent; padding: 15px; display: flex; justify-content: space-around; align-items: center; }
        .admin-nav a { color: #000; text-decoration: none; font-weight: bold; }
        .admin-nav a:hover { color: purple; }
        .header-font { font-family: 'Alfa Slab One', cursive; text-align: center; }
        
        table { width: 95%; margin: 40px auto; border-collapse: collapse; color: #fff; }
        th, td { padding: 15px; text-align: center; border: 1px solid #444; }
        th { background: #333; }

        .receipt-box { width: 60px; height: 40px; border: 1px solid #777; background: #222; margin: 0 auto; }

        .logout-btn { border: 1px solid #000; border-radius: 20px; transition: 0.3s; padding: 8px 20px; }

        .logout-btn:hover { background-color: #fff; color: #000 !important; }
    </style>
</head>

<script src="../script.js"></script>

<body>

<header>
    <div class="retro-header">SHELTER OF LIGHT</div>
    <nav class="admin-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="rescues.html">Rescues</a>
        <a href="medical.html">Medical Records</a>
        <a href="donations.html" style="color: purple;">Donations</a>
        <a href="applications.html">Applications</a>

        <a href="login.html" class="logout-btn">LOGOUT</a>
    </nav>
</header>

<div class="header-font" style="margin-top: 40px;">
    <h1 style="font-size: 50px; margin: 0; color: #ffd464 !important; font-family: 'Alfa Slab One', cursive;">Donations</h1>
</div>

<table id="donationTable">
    <thead>
        <tr>
            <th>Donation ID</th><th>Sender Name</th><th>Transaction Date</th>
            <th>Amount (PHP)</th><th>Payment Channel</th><th>Reference Number</th>
            <th>Receipt</th><th>Status</th><th>Action</th>
        </tr>
    </thead>
    <tbody id="donationBody">
        <tr><td colspan="9">Loading...</td></tr>
    </tbody>
</table>

<script>
    async function loadDonations() {
        const result = await getAllDonations();
        const body = document.getElementById('donationBody');
        if (!result.success) {
            body.innerHTML = `<tr><td colspan="9">${apiErrorText(result)}</td></tr>`;
            if (/log in/i.test(result.message || '')) setTimeout(() => window.location.href = 'login.html', 1200);
            return;
        }
        if (!result.data.length) {
            body.innerHTML = `<tr><td colspan="9">No donations yet.</td></tr>`;
            return;
        }
        body.innerHTML = result.data.map(d => {
            const verified = d.Verification_Status === 'Verified';
            const receipt = d.Screenshot_Path
                ? `<a href="../../backend${d.Screenshot_Path}" target="_blank" style="color:#ffd464;">View</a>`
                : '—';
            const toggle = verified
                ? `<button onclick="setDonation(${d.Donation_ID}, false)">Unverify</button>`
                : `<button onclick="setDonation(${d.Donation_ID}, true)">Verify</button>`;
            return `
            <tr>
                <td>${d.Donation_ID}</td>
                <td>${d.Sender_Name}</td>
                <td>${d.Transaction_Date}</td>
                <td>${d.Amount_PHP}</td>
                <td>${d.Payment_Channel || '—'}</td>
                <td>${d.Reference_Number || '—'}</td>
                <td>${receipt}</td>
                <td>${d.Verification_Status}</td>
                <td>${toggle} <button onclick="removeDonation(${d.Donation_ID})">Delete</button></td>
            </tr>`;
        }).join('');
    }

    async function setDonation(id, verify) {
        const r = verify ? await verifyDonation(id) : await unverifyDonation(id);
        showNotification(r.success ? r.message : apiErrorText(r), r.success ? 'success' : 'error');
        if (r.success) loadDonations();
    }

    async function removeDonation(id) {
        if (!confirm('Delete donation #' + id + '?')) return;
        const r = await deleteDonation(id);
        showNotification(r.success ? r.message : apiErrorText(r), r.success ? 'success' : 'error');
        if (r.success) loadDonations();
    }

    document.addEventListener('DOMContentLoaded', loadDonations);
</script>

</body>
</html>
